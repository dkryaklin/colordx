name: Changeset & Release

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-changeset:
    name: Generate Changeset
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Cache yarn global cache
        uses: actions/cache@v4
        with:
          path: ~/.yarn/berry/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - run: yarn install --immutable

      - name: Generate changeset
        run: yarn tsx scripts/changeset.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_BRANCH: ${{ github.base_ref || github.event.before }}

      - name: Commit changeset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset/
          git diff --staged --quiet || git commit -m "chore: add auto-generated changeset"
          git push

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [auto-changeset]
    # always() lets this run even when auto-changeset is skipped (bot push)
    if: always() && github.event_name == 'push'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Enable Corepack
        run: corepack enable

      - name: Cache yarn global cache
        uses: actions/cache@v4
        with:
          path: ~/.yarn/berry/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - run: yarn install --immutable

      - run: yarn build
      - run: yarn publint

      - name: Check for changesets
        id: check
        run: |
          COUNT=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          echo "has_changesets=$([ $COUNT -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Version packages
        if: steps.check.outputs.has_changesets == 'true'
        run: yarn changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push version bump
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md .changeset
          git diff --staged --quiet || (git commit -m "chore: release" && git push)

      - name: Publish to npm
        if: steps.check.outputs.has_changesets == 'true'
        run: yarn changeset publish --provenance

      - name: Create GitHub releases
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="@colordx/core@${VERSION}"
          NOTES=$(VERSION="$VERSION" node -e '
            const fs = require("fs");
            const changelog = fs.readFileSync("CHANGELOG.md", "utf8");
            const version = process.env.VERSION;
            const match = changelog.match(new RegExp("## " + version.replace(/\./g, "\\.") + "\\n([\\s\\S]*?)(?=\\n## |$)"));
            process.stdout.write(match ? match[1].trim() : "");
          ')
          gh release create "${TAG}" \
            --title "v${VERSION}" \
            --notes "${NOTES}" \
            2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
