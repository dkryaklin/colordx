name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Enable Corepack
        run: corepack enable

      - name: Cache yarn global cache
        uses: actions/cache@v4
        with:
          path: ~/.yarn/berry/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - run: yarn install --immutable
      - run: yarn build
      - run: yarn publint

      - name: Find last release ref
        id: last
        run: |
          TAG=$(git describe --tags --abbrev=0 --match '@colordx/core@*' 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            TAG=$(git rev-list --max-parents=0 HEAD | head -1)
          fi
          echo "ref=$TAG" >> "$GITHUB_OUTPUT"
          echo "Diffing against: $TAG"

      - name: Generate changeset via AI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUMP: ${{ inputs.bump }}
          BASE_REF: ${{ steps.last.outputs.ref }}
        run: yarn tsx scripts/changeset.ts

      - name: Version packages
        run: yarn changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md .changeset
          git diff --staged --quiet || (git commit -m "chore: release" && git push)

      - name: Publish to npm
        run: yarn changeset publish --provenance

      - name: Create GitHub release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="@colordx/core@${VERSION}"
          NOTES=$(VERSION="$VERSION" node -e '
            const fs = require("fs");
            const changelog = fs.readFileSync("CHANGELOG.md", "utf8");
            const version = process.env.VERSION;
            const match = changelog.match(new RegExp("## " + version.replace(/\./g, "\\.") + "\\n([\\s\\S]*?)(?=\\n## |$)"));
            process.stdout.write(match ? match[1].trim() : "");
          ')
          gh release create "${TAG}" \
            --title "v${VERSION}" \
            --notes "${NOTES}" \
            2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
